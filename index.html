<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>변형 스도쿠</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <!-- 스도쿠 판 (패널 없이 판만 떠 있음) -->
  <div id="board-panel" class="board-panel">
    <div class="board-wrapper">
      <svg id="sudoku-svg" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>
  </div>

  <!-- 숫자 입력 키패드 패널 -->
  <div id="keypad-panel" class="keypad-panel">
    <div id="kp-extra-menu" class="kp-extra-menu">
      <div class="kp-extra-inner">
        <p class="kp-extra-placeholder">추가 메뉴 (준비 중)</p>
      </div>
    </div>
    <button id="kp-toggle" class="kp-toggle" type="button" aria-label="추가 메뉴 열기/닫기">‹</button>
    <div id="kp-panel-body" class="kp-panel-body">
      <div class="kp-body">
        <div id="keypad-grid" class="kp-grid"></div>
        <div class="kp-sep"></div>
        <button id="btn-reset-all" class="kp-reset-all" type="button">모두 지우기</button>
      </div>
    </div>
  </div>

  <!-- 완성 토스트 -->
  <div id="toast" class="toast">🎉 퍼즐 완성!</div>

  <!-- 모두 지우기 확인 모달 -->
  <div id="confirm-modal" class="modal-overlay">
    <div class="modal-card">
      <p class="modal-text">입력한 숫자를 모두 지울까요?<br/>초기 제공 숫자는 유지됩니다.</p>
      <div class="modal-actions">
        <button id="confirm-cancel" class="modal-btn modal-btn-cancel" type="button">취소</button>
        <button id="confirm-ok" class="modal-btn modal-btn-danger" type="button">모두 지우기</button>
      </div>
    </div>
  </div>

  <script type="module" src="src/main.js"></script>
</body>
</html>
